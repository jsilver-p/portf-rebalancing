  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"f50deb22-9088-4f6f-a56b-4245366b50eb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* Primary UI typeface — resolves to real SF on Apple hardware */\n  --font-ui: -apple-system, BlinkMacSystemFont, \"SF Pro Text\", \"SF Pro Display\",\n             \"Segoe UI\", system-ui, \"Helvetica Neue\", Arial, sans-serif;\n\n  /* Display / decorative fonts used in story widgets & templates */\n  --font-abel: \"Abel\", var(--font-ui);          /* countdown / promo numerals */\n  --font-dosis: \"Dosis\", var(--font-ui);        /* story widget headings */\n  --font-mohave: \"Mohave\", var(--font-ui);      /* condensed callouts */\n  --font-mono: \"IBM Plex Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n}\n<\u002Fstyle>\n  <style>/* ───────────────────────────────────────────────────────────\n   COLOR TOKENS  ·  Instagram UI Kit 1.0\n   Base palette extracted from the Figma file, then organized into\n   semantic aliases. Light is the default theme; [data-theme=\"dark\"]\n   remaps the semantic layer for night mode.\n   ─────────────────────────────────────────────────────────── */\n\n:root {\n  /* ---- Base neutrals ---- */\n  --ig-white:      #ffffff;\n  --ig-black:      #000000;\n  --ig-gray-00:    #fafafa;   /* app background */\n  --ig-gray-05:    #efefef;   /* secondary button / chip fill (239,239,239) */\n  --ig-gray-10:    #dfdfe8;   /* hairline divider (223,223,232) */\n  --ig-gray-15:    #dddddd;   /* border (221) */\n  --ig-gray-20:    #d9d9d9;   /* skeleton (217) */\n  --ig-gray-30:    #c4c4c4;   /* disabled stroke (196) */\n  --ig-gray-40:    #b4b4b4;   /* muted icon (180) */\n  --ig-gray-50:    #999999;   /* tertiary text (153) */\n  --ig-gray-60:    #6e6e6e;   /* secondary text (110) */\n  --ig-gray-90:    #262626;   /* dark surface line */\n\n  /* ---- Brand blues (actions & links) ---- */\n  --ig-blue:       #1fa1ff;   /* primary CTA fill (31,161,255) */\n  --ig-blue-link:  #3897f0;   /* inline links / \"more\" (56,151,240) */\n  --ig-blue-deep:  #004c8b;   /* pressed / username on photo (0,76,139) */\n\n  /* ---- Reds (like / live / alerts) ---- */\n  --ig-red:        #ff4963;   /* notification dot / heart hover (255,73,99) */\n  --ig-red-heart:  #ed4956;   /* filled like heart */\n  --ig-red-live:   #fe0135;   /* LIVE badge (254,1,53) */\n\n  /* ---- Story / gradient brand ramp ---- *\n   * Gradient stops do not survive .fig reconstruction; these are the\n   * canonical Instagram story-ring stops, confirmed against the kit's\n   * warm→magenta→violet ring direction. */\n  --ig-grad-yellow: #feda77;\n  --ig-grad-orange: #f58529;\n  --ig-grad-pink:   #dd2a7b;\n  --ig-grad-purple: #8134af;\n  --ig-grad-violet: #515bd4;\n\n  --ig-gradient-story: linear-gradient(45deg,\n      var(--ig-grad-yellow) 0%, var(--ig-grad-orange) 25%,\n      var(--ig-grad-pink) 50%, var(--ig-grad-purple) 75%,\n      var(--ig-grad-violet) 100%); /* @kind color */\n  /* Ring rendered as a conic sweep (matches the camera-style ring) */\n  --ig-gradient-ring: conic-gradient(from 220deg,\n      var(--ig-grad-violet), var(--ig-grad-purple), var(--ig-grad-pink),\n      var(--ig-grad-orange), var(--ig-grad-yellow), var(--ig-grad-violet)); /* @kind color */\n\n  /* ---- Semantic aliases · LIGHT ---- */\n  --bg-app:        var(--ig-gray-00);\n  --bg-surface:    var(--ig-white);\n  --bg-elevated:   var(--ig-white);\n  --bg-secondary:  var(--ig-gray-05);   /* secondary buttons, search field */\n  --bg-skeleton:   var(--ig-gray-20);\n\n  --text-primary:  var(--ig-black);\n  --text-secondary:var(--ig-gray-60);\n  --text-tertiary: var(--ig-gray-50);\n  --text-link:     var(--ig-blue-link);\n  --text-on-accent:var(--ig-white);\n\n  --border-default:var(--ig-gray-10);\n  --border-strong: var(--ig-gray-30);\n\n  --accent:        var(--ig-blue);\n  --accent-text:   var(--ig-white);\n  --like:          var(--ig-red-heart);\n  --notify:        var(--ig-red);\n\n  /* ---- Shadows (rgba 0,0,0 .10/.15/.25 in source) ---- */\n  --shadow-sm:  0 1px 2px rgba(0,0,0,0.10);\n  --shadow-md:  0 2px 8px rgba(0,0,0,0.15);\n  --shadow-lg:  0 8px 24px rgba(0,0,0,0.25);\n  /* Protection gradient under stories / over media for legibility */\n  --scrim-top:    linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0)); /* @kind color */\n  --scrim-bottom: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0)); /* @kind color */\n}\n\n/* ---- Semantic aliases · DARK ---- */\n[data-theme=\"dark\"] {\n  --bg-app:        #000000;\n  --bg-surface:    #000000;\n  --bg-elevated:   #1c1c1e;\n  --bg-secondary:  #363636;\n  --bg-skeleton:   #2a2a2a;\n\n  --text-primary:  #ffffff;\n  --text-secondary:#a8a8a8;\n  --text-tertiary: #7a7a7a;\n  --text-link:     #5fb1ff;\n  --text-on-accent:#ffffff;\n\n  --border-default:#262626;\n  --border-strong: #3a3a3a;\n\n  --accent:        var(--ig-blue);\n  --like:          var(--ig-red-heart);\n\n  --shadow-sm:  0 1px 2px rgba(0,0,0,0.6);\n  --shadow-md:  0 2px 10px rgba(0,0,0,0.7);\n  --shadow-lg:  0 10px 30px rgba(0,0,0,0.8);\n}\n<\u002Fstyle>\n  <style>/* ───────────────────────────────────────────────────────────\n   TYPOGRAPHY TOKENS\n   Type scale reconstructed from the kit. Instagram UI text runs\n   small & tight (11–16px on a 375pt frame); display sizes come from\n   the story-template numerals. Line-heights kept generous for the\n   readability / senior-friendly layer (see accessibility.css).\n   ─────────────────────────────────────────────────────────── */\n\n:root {\n  /* Font family handles (defined in fonts.css) */\n  --font-ui: -apple-system, BlinkMacSystemFont, \"SF Pro Text\", \"Segoe UI\",\n             system-ui, \"Helvetica Neue\", Arial, sans-serif;\n\n  /* ---- Weights (SF maps Regular/Medium/Semibold/Bold) ---- */\n  --fw-regular: 400;   /* @kind font */\n  --fw-medium:  500;   /* @kind font */\n  --fw-semibold:600;   /* @kind font */\n  --fw-bold:    700;   /* @kind font */\n\n  /* ---- Size ramp ---- */\n  --fs-11: 11px;   /* timestamps, tab labels (SF Pro Medium 11) */\n  --fs-12: 12px;   /* captions, secondary meta, usernames in lists */\n  --fs-13: 13px;   /* body / comments / button text (SF UI 13) */\n  --fs-14: 14px;   /* default reading size, post body */\n  --fs-16: 16px;   /* emphasized body, field input */\n  --fs-18: 18px;   /* section titles */\n  --fs-20: 20px;   /* nav wordmark scale / counts */\n  --fs-22: 22px;   /* screen titles */\n  --fs-24: 24px;   /* large headline */\n  --fs-35: 35px;   /* story widget heading (Dosis 35) */\n  --fs-50: 50px;   /* display */\n  --fs-60: 60px;   /* big numeral */\n  --fs-80: 80px;   /* hero numeral (countdown / cover) */\n\n  /* ---- Line heights ---- */\n  --lh-tight:  1.0;    /* @kind font */\n  --lh-snug:   1.25;   /* @kind font */\n  --lh-normal: 1.45;   /* @kind font */\n  --lh-relaxed:1.6;    /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight:  -0.2px;  /* @kind font */\n  --ls-normal: 0;       /* @kind font */\n  --ls-wide:   0.3px;   /* @kind font */\n  --ls-caps:   0.8px;   /* @kind font */\n\n  /* ---- Semantic text roles ---- */\n  --text-headline: var(--fw-bold)    var(--fs-22)/var(--lh-snug)   var(--font-ui);\n  --text-title:    var(--fw-semibold)var(--fs-16)/var(--lh-snug)   var(--font-ui);\n  --text-body:     var(--fw-regular) var(--fs-14)/var(--lh-normal) var(--font-ui);\n  --text-button:   var(--fw-bold)    var(--fs-13)/var(--lh-snug)   var(--font-ui);\n  --text-username: var(--fw-semibold)var(--fs-13)/var(--lh-snug)   var(--font-ui);\n  --text-caption:  var(--fw-regular) var(--fs-12)/var(--lh-normal) var(--font-ui);\n  --text-meta:     var(--fw-medium)  var(--fs-11)/var(--lh-tight)  var(--font-ui);\n}\n<\u002Fstyle>\n  <style>/* ───────────────────────────────────────────────────────────\n   SPACING · RADII · BORDERS · MOTION\n   Instagram works on a tight 4px grid. Component padding is small;\n   the rhythm comes from generous whitespace around square media.\n   ─────────────────────────────────────────────────────────── */\n\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --sp-0:  0;    /* @kind spacing */\n  --sp-1:  2px;\n  --sp-2:  4px;\n  --sp-3:  6px;\n  --sp-4:  8px;\n  --sp-5:  10px;\n  --sp-6:  12px;\n  --sp-7:  14px;\n  --sp-8:  16px;   /* standard screen gutter */\n  --sp-10: 20px;\n  --sp-12: 24px;\n  --sp-16: 32px;\n  --sp-20: 40px;\n  --sp-24: 48px;\n\n  --gutter: var(--sp-8);          /* horizontal screen padding */\n  --post-gap: var(--sp-6);        /* gap between post action icons */\n\n  /* ---- Radii ---- *\n   * The kit uses sharp 3px corners on buttons and square media; pills\n   * for story rings/avatars. Modern IG drifts to 8px — exposed too. */\n  --radius-xs:   3px;   /* buttons, chips (source value) */\n  --radius-sm:   6px;\n  --radius-md:   8px;   /* cards, sheets (modern IG) */\n  --radius-lg:   12px;\n  --radius-xl:   20px;\n  --radius-pill: 999px; /* avatars, story rings, toggles */\n\n  /* ---- Borders ---- */\n  --bw-hair:  0.5px;   /* retina hairline divider */\n  --bw-1:     1px;\n  --bw-2:     2px;     /* avatar inner ring gap */\n  --bw-ring:  3px;     /* story gradient ring thickness */\n\n  /* ---- Sizing primitives ---- */\n  --avatar-xs: 24px;\n  --avatar-sm: 32px;\n  --avatar-md: 36px;   /* feed header avatar */\n  --avatar-lg: 56px;   /* story tray avatar */\n  --avatar-xl: 90px;   /* profile avatar */\n  --tap-min:   44px;   /* minimum touch target */\n  --navbar-h:  44px;\n  --tabbar-h:  49px;\n  --frame-w:   375px;  /* iPhone design width */\n\n  /* ---- Motion: quick & soft — short eases, gentle like-pop, no chrome bounce ---- */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 200ms; /* @kind other */\n  --dur-slow: 320ms; /* @kind other */\n  --ease-out:   cubic-bezier(0.2, 0, 0.1, 1);    /* @kind other */\n  --ease-in-out:cubic-bezier(0.4, 0, 0.2, 1);    /* @kind other */\n  --ease-spring:cubic-bezier(0.2, 0.9, 0.3, 1.3);  /* @kind other */\n\n  /* ---- Z-index ladder ---- */\n  --z-nav: 100;     /* @kind other */\n  --z-tabbar: 100;  /* @kind other */\n  --z-sheet: 200;   /* @kind other */\n  --z-toast: 300;   /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ───────────────────────────────────────────────────────────\n   READABILITY & SENIOR-FRIENDLY LAYER  ·  \"편안한 보기 / Comfort Mode\"\n   An opt-in accessibility scope requested for this system. Instagram's\n   stock chrome is small and tight; applying [data-reading=\"comfort\"] to\n   any subtree scales type, opens line-height, enlarges touch targets to\n   ≥48px, and raises text contrast — without changing brand color or\n   layout. Pairs with the \"analog\" warmth tokens below.\n   ─────────────────────────────────────────────────────────── */\n\n:root {\n  /* Analog / warm-paper accents — used by the senior-friendly views &\n     the \"analog\" guideline cards. A softer, off-white world vs the\n     stark digital white, with ink-toned text. */\n  --analog-paper:  #f6f1e7;   /* warm off-white \"paper\" */\n  --analog-paper-2:#efe7d6;\n  --analog-ink:    #2b2622;   /* warm near-black ink */\n  --analog-ink-soft:#5b5249;\n  --analog-line:   #d8cdb8;   /* warm hairline */\n  --analog-accent: #c25b3a;   /* terracotta stamp */\n  --analog-grain:  rgba(43,38,34,0.04); /* @kind color */\n\n  /* Comfort-mode tuning knobs (defaults = no change) */\n  --read-scale: 1;            /* @kind other */\n  --read-lh: var(--lh-normal); /* @kind other */\n  --read-tap: var(--tap-min);  /* @kind other */\n}\n\n/* When comfort reading is on, scale the type ramp & spacing up and\n   widen line-height + tap targets. Scope it; never global by default. */\n[data-reading=\"comfort\"] {\n  --read-scale: 1.25;  /* @kind other */\n  --read-lh: var(--lh-relaxed);\n  --read-tap: 48px;\n\n  /* Re-derive the size ramp at comfort scale */\n  --fs-11: 13px;\n  --fs-12: 15px;\n  --fs-13: 16px;\n  --fs-14: 18px;   /* comfortable t-family: 'Mohave';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d7815ba6-7f96-406e-893c-b92d19b00439\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mohave';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f50deb22-9088-4f6f-a56b-4245366b50eb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* Primary UI typeface — resolves to real SF on Apple hardware */\n  --font-ui: -apple-system, BlinkMacSystemFont, \"SF Pro Text\", \"SF Pro Display\",\n             \"Segoe UI\", system-ui, \"Helvetica Neue\", Arial, sans-serif;\n\n  /* Display / decorative fonts used in story widgets & templates */\n  --font-abel: \"Abel\", var(--font-ui);          /* countdown / promo numerals */\n  --font-dosis: \"Dosis\", var(--font-ui);        /* story widget headings */\n  --font-mohave: \"Mohave\", var(--font-ui);      /* condensed callouts */\n  --font-mono: \"IBM Plex Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n}\n\n/* ───────────────────────────────────────────────────────────\n   COLOR TOKENS  ·  Instagram UI Kit 1.0\n   Base palette extracted from the Figma file, then organized into\n   semantic aliases. Light is the default theme; [data-theme=\"dark\"]\n   remaps the semantic layer for night mode.\n   ─────────────────────────────────────────────────────────── */\n\n:root {\n  /* ---- Base neutrals ---- */\n  --ig-white:      #ffffff;\n  --ig-black:      #000000;\n  --ig-gray-00:    #fafafa;   /* app background */\n  --ig-gray-05:    #efefef;   /* secondary button / chip fill (239,239,239) */\n  --ig-gray-10:    #dfdfe8;   /* hairline divider (223,223,232) */\n  --ig-gray-15:    #dddddd;   /* border (221) */\n  --ig-gray-20:    #d9d9d9;   /* skeleton (217) */\n  --ig-gray-30:    #c4c4c4;   /* disabled stroke (196) */\n  --ig-gray-40:    #b4b4b4;   /* muted icon (180) */\n  --ig-gray-50:    #999999;   /* tertiary text (153) */\n  --ig-gray-60:    #6e6e6e;   /* secondary text (110) */\n  --ig-gray-90:    #262626;   /* dark surface line */\n\n  /* ---- Brand blues (actions & links) ---- */\n  --ig-blue:       #1fa1ff;   /* primary CTA fill (31,161,255) */\n  --ig-blue-link:  #3897f0;   /* inline links / \"more\" (56,151,240) */\n  --ig-blue-deep:  #004c8b;   /* pressed / username on photo (0,76,139) */\n\n  /* ---- Reds (like / live / alerts) ---- */\n  --ig-red:        #ff4963;   /* notification dot / heart hover (255,73,99) */\n  --ig-red-heart:  #ed4956;   /* filled like heart */\n  --ig-red-live:   #fe0135;   /* LIVE badge (254,1,53) */\n\n  /* ---- Story / gradient brand ramp ---- *\n   * Gradient stops do not survive .fig reconstruction; these are the\n   * canonical Instagram story-ring stops, confirmed against the kit's\n   * warm→magenta→violet ring direction. */\n  --ig-grad-yellow: #feda77;\n  --ig-grad-orange: #f58529;\n  --ig-grad-pink:   #dd2a7b;\n  --ig-grad-purple: #8134af;\n  --ig-grad-violet: #515bd4;\n\n  --ig-gradient-story: linear-gradient(45deg,\n      var(--ig-grad-yellow) 0%, var(--ig-grad-orange) 25%,\n      var(--ig-grad-pink) 50%, var(--ig-grad-purple) 75%,\n      var(--ig-grad-violet) 100%); /* @kind color */\n  /* Ring rendered as a conic sweep (matches the camera-style ring) */\n  --ig-gradient-ring: conic-gradient(from 220deg,\n      var(--ig-grad-violet), var(--ig-grad-purple), var(--ig-grad-pink),\n      var(--ig-grad-orange), var(--ig-grad-yellow), var(--ig-grad-violet)); /* @kind color */\n\n  /* ---- Semantic aliases · LIGHT ---- */\n  --bg-app:        var(--ig-gray-00);\n  --bg-surface:    var(--ig-white);\n  --bg-elevated:   var(--ig-white);\n  --bg-secondary:  var(--ig-gray-05);   /* secondary buttons, search field */\n  --bg-skeleton:   var(--ig-gray-20);\n\n  --text-primary:  var(--ig-black);\n  --text-secondary:var(--ig-gray-60);\n  --text-tertiary: var(--ig-gray-50);\n  --text-link:     var(--ig-blue-link);\n  --text-on-accent:var(--ig-white);\n\n  --border-default:var(--ig-gray-10);\n  --border-strong: var(--ig-gray-30);\n\n  --accent:        var(--ig-blue);\n  --accent-text:   var(--ig-white);\n  --like:          var(--ig-red-heart);\n  --notify:        var(--ig-red);\n\n  /* ---- Shadows (rgba 0,0,0 .10/.15/.25 in source) ---- */\n  --shadow-sm:  0 1px 2px rgba(0,0,0,0.10);\n  --shadow-md:  0 2px 8px rgba(0,0,0,0.15);\n  --shadow-lg:  0 8px 24px rgba(0,0,0,0.25);\n  /* Protection gradient under stories / over media for legibility */\n  --scrim-top:    linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0)); /* @kind color */\n  --scrim-bottom: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0)); /* @kind color */\n}\n\n/* ---- Semantic aliases · DARK ---- */\n[data-theme=\"dark\"] {\n  --bg-app:        #000000;\n  --bg-surface:    #000000;\n  --bg-elevated:   #1c1c1e;\n  --bg-secondary:  #363636;\n  --bg-skeleton:   #2a2a2a;\n\n  --text-primary:  #ffffff;\n  --text-secondary:#a8a8a8;\n  --text-tertiary: #7a7a7a;\n  --text-link:     #5fb1ff;\n  --text-on-accent:#ffffff;\n\n  --border-default:#262626;\n  --border-strong: #3a3a3a;\n\n  --accent:        var(--ig-blue);\n  --like:          var(--ig-red-heart);\n\n  --shadow-sm:  0 1px 2px rgba(0,0,0,0.6);\n  --shadow-md:  0 2px 10px rgba(0,0,0,0.7);\n  --shadow-lg:  0 10px 30px rgba(0,0,0,0.8);\n}\n\n/* ───────────────────────────────────────────────────────────\n   TYPOGRAPHY TOKENS\n   Type scale reconstructed from the kit. Instagram UI text runs\n   small & tight (11–16px on a 375pt frame); display sizes come from\n   the story-template numerals. Line-heights kept generous for the\n   readability / senior-friendly layer (see accessibility.css).\n   ─────────────────────────────────────────────────────────── */\n\n:root {\n  /* Font family handles (defined in fonts.css) */\n  --font-ui: -apple-system, BlinkMacSystemFont, \"SF Pro Text\", \"Segoe UI\",\n             system-ui, \"Helvetica Neue\", Arial, sans-serif;\n\n  /* ---- Weights (SF maps Regular/Medium/Semibold/Bold) ---- */\n  --fw-regular: 400;   /* @kind font */\n  --fw-medium:  500;   /* @kind font */\n  --fw-semibold:600;   /* @kind font */\n  --fw-bold:    700;   /* @kind font */\n\n  /* ---- Size ramp ---- */\n  --fs-11: 11px;   /* timestamps, tab labels (SF Pro Medium 11) */\n  --fs-12: 12px;   /* captions, secondary meta, usernames in lists */\n  --fs-13: 13px;   /* body / comments / button text (SF UI 13) */\n  --fs-14: 14px;   /* default reading size, post body */\n  --fs-16: 16px;   /* emphasized body, field input */\n  --fs-18: 18px;   /* section titles */\n  --fs-20: 20px;   /* nav wordmark scale / counts */\n  --fs-22: 22px;   /* screen titles */\n  --fs-24: 24px;   /* large headline */\n  --fs-35: 35px;   /* story widget heading (Dosis 35) */\n  --fs-50: 50px;   /* display */\n  --fs-60: 60px;   /* big numeral */\n  --fs-80: 80px;   /* hero numeral (countdown / cover) */\n\n  /* ---- Line heights ---- */\n  --lh-tight:  1.0;    /* @kind font */\n  --lh-snug:   1.25;   /* @kind font */\n  --lh-normal: 1.45;   /* @kind font */\n  --lh-relaxed:1.6;    /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight:  -0.2px;  /* @kind font */\n  --ls-normal: 0;       /* @kind font */\n  --ls-wide:   0.3px;   /* @kind font */\n  --ls-caps:   0.8px;   /* @kind font */\n\n  /* ---- Semantic text roles ---- */\n  --text-headline: var(--fw-bold)    var(--fs-22)/var(--lh-snug)   var(--font-ui);\n  --text-title:    var(--fw-semibold)var(--fs-16)/var(--lh-snug)   var(--font-ui);\n  --text-body:     var(--fw-regular) var(--fs-14)/var(--lh-normal) var(--font-ui);\n  --text-button:   var(--fw-bold)    var(--fs-13)/var(--lh-snug)   var(--font-ui);\n  --text-username: var(--fw-semibold)var(--fs-13)/var(--lh-snug)   var(--font-ui);\n  --text-caption:  var(--fw-regular) var(--fs-12)/var(--lh-normal) var(--font-ui);\n  --text-meta:     var(--fw-medium)  var(--fs-11)/var(--lh-tight)  var(--font-ui);\n}\n\n/* ───────────────────────────────────────────────────────────\n   SPACING · RADII · BORDERS · MOTION\n   Instagram works on a tight 4px grid. Component padding is small;\n   the rhythm comes from generous whitespace around square media.\n   ─────────────────────────────────────────────────────────── */\n\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --sp-0:  0;    /* @kind spacing */\n  --sp-1:  2px;\n  --sp-2:  4px;\n  --sp-3:  6px;\n  --sp-4:  8px;\n  --sp-5:  10px;\n  --sp-6:  12px;\n  --sp-7:  14px;\n  --sp-8:  16px;   /* standard screen gutter */\n  --sp-10: 20px;\n  --sp-12: 24px;\n  --sp-16: 32px;\n  --sp-20: 40px;\n  --sp-24: 48px;\n\n  --gutter: var(--sp-8);          /* horizontal screen padding */\n  --post-gap: var(--sp-6);        /* gap between post action icons */\n\n  /* ---- Radii ---- *\n   * The kit uses sharp 3px corners on buttons and square media; pills\n   * for story rings/avatars. Modern IG drifts to 8px — exposed too. */\n  --radius-xs:   3px;   /* buttons, chips (source value) */\n  --radius-sm:   6px;\n  --radius-md:   8px;   /* cards, sheets (modern IG) */\n  --radius-lg:   12px;\n  --radius-xl:   20px;\n  --radius-pill: 999px; /* avatars, story rings, toggles */\n\n  /* ---- Borders ---- */\n  --bw-hair:  0.5px;   /* retina hairline divider */\n  --bw-1:     1px;\n  --bw-2:     2px;     /* avatar inner ring gap */\n  --bw-ring:  3px;     /* story gradient ring thickness */\n\n  /* ---- Sizing primitives ---- */\n  --avatar-xs: 24px;\n  --avatar-sm: 32px;\n  --avatar-md: 36px;   /* feed header avatar */\n  --avatar-lg: 56px;   /* story tray avatar */\n  --avatar-xl: 90px;   /* profile avatar */\n  --tap-min:   44px;   /* minimum touch target */\n  --navbar-h:  44px;\n  --tabbar-h:  49px;\n  --frame-w:   375px;  /* iPhone design width */\n\n  /* ---- Motion: quick & soft — short eases, gentle like-pop, no chrome bounce ---- */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 200ms; /* @kind other */\n  --dur-slow: 320ms; /* @kind other */\n  --ease-out:   cubic-bezier(0.2, 0, 0.1, 1);    /* @kind other */\n  --ease-in-out:cubic-bezier(0.4, 0, 0.2, 1);    /* @kind other */\n  --ease-spring:cubic-bezier(0.2, 0.9, 0.3, 1.3);  /* @kind other */\n\n  /* ---- Z-index ladder ---- */\n  --z-nav: 100;     /* @kind other */\n  --z-tabbar: 100;  /* @kind other */\n  --z-sheet: 200;   /* @kind other */\n  --z-toast: 300;   /* @kind other */\n}\n\n/* ───────────────────────────────────────────────────────────\n   READABILITY & SENIOR-FRIENDLY LAYER  ·  \"편안한 보기 / Comfort Mode\"\n   An opt-in accessibility scope requested for this system. Instagram's\n   stock chrome is small and tight; applying [data-reading=\"comfort\"] to\n   any subtree scales type, opens line-height, enlarges touch targets to\n   ≥48px, and raises text contrast — without changing brand color or\n   layout. Pairs with the \"analog\" warmth tokens below.\n   ─────────────────────────────────────────────────────────── */\n\n:root {\n  /* Analog / warm-paper accents — used by the senior-friendly views &\n     the \"analog\" guideline cards. A softer, off-white world vs the\n     stark digital white, with ink-toned text. */\n  --analog-paper:  #f6f1e7;   /* warm off-white \"paper\" */\n  --analog-paper-2:#efe7d6;\n  --analog-ink:    #2b2622;   /* warm near-black ink */\n  --analog-ink-soft:#5b5249;\n  --analog-line:   #d8cdb8;   /* warm hairline */\n  --analog-accent: #c25b3a;   /* terracotta stamp */\n  --analog-grain:  rgba(43,38,34,0.04); /* @kind color */\n\n  /* Comfort-mode tuning knobs (defaults = no change) */\n  --read-scale: 1;            /* @kind other */\n  --read-lh: var(--lh-normal); /* @kind other */\n  --read-tap: var(--tap-min);  /* @kind other */\n}\n\n/* When comfort reading is on, scale the type ramp & spacing up and\n   widen line-height + tap targets. Scope it; never global by default. */\n[data-reading=\"comfort\"] {\n  --read-scale: 1.25;  /* @kind other */\n  --read-lh: var(--lh-relaxed);\n  --read-tap: 48px;\n\n  /* Re-derive the size ramp at comfort scale */\n  --fs-11: 13px;\n  --fs-12: 15px;\n  --fs-13: 16px;\n  --fs-14: 18px;   /* comfortable reading baseline */\n  --fs-16: 20px;\n  --fs-18: 22px;\n  --fs-20: 24px;\n  --fs-22: 26px;\n  --fs-24: 30px;\n\n  /* Stronger contrast: drop muted greys toward ink */\n  --text-secondary: #4a4a4a;\n  --text-tertiary:  #5e5e5e;\n  --border-default: var(--ig-gray-30);\n  --tap-min: 48px;\n\n  /* Re-derive the composite text roles so they pick up the scaled --fs-*\n     above. Without this the roles stay frozen at the :root sizes, because a\n     custom property's var() is resolved where the property is DECLARED. */\n  --text-headline: var(--fw-bold)     var(--fs-22)/var(--lh-snug)    var(--font-ui);\n  --text-title:    var(--fw-semibold) var(--fs-16)/var(--lh-snug)    var(--font-ui);\n  --text-body:     var(--fw-regular)  var(--fs-14)/var(--lh-relaxed) var(--font-ui);\n  --text-button:   var(--fw-bold)     var(--fs-13)/var(--lh-snug)    var(--font-ui);\n  --text-username: var(--fw-semibold) var(--fs-13)/var(--lh-snug)    var(--font-ui);\n  --text-caption:  var(--fw-regular)  var(--fs-12)/var(--lh-relaxed) var(--font-ui);\n  --text-meta:     var(--fw-medium)   var(--fs-11)/var(--lh-snug)    var(--font-ui);\n}\n\n[data-reading=\"comfort\"] body,\n[data-reading=\"comfort\"] {\n  line-height: var(--read-lh);\n}\n\n/* Largest tier for low-vision use */\n[data-reading=\"large\"] {\n  --fs-13: 18px;\n  --fs-14: 21px;\n  --fs-16: 24px;\n  --fs-18: 28px;\n  --fs-22: 32px;\n  --text-secondary: #3a3a3a;\n  --tap-min: 56px;\n  --read-lh: var(--lh-relaxed);\n  line-height: var(--lh-relaxed);\n\n  /* Re-derive composite roles at the large-tier sizes (see comfort note). */\n  --text-headline: var(--fw-bold)     var(--fs-22)/var(--lh-snug)    var(--font-ui);\n  --text-title:    var(--fw-semibold) var(--fs-16)/var(--lh-snug)    var(--font-ui);\n  --text-body:     var(--fw-regular)  var(--fs-14)/var(--lh-relaxed) var(--font-ui);\n  --text-button:   var(--fw-bold)     var(--fs-13)/var(--lh-snug)    var(--font-ui);\n  --text-username: var(--fw-semibold) var(--fs-13)/var(--lh-snug)    var(--font-ui);\n  --text-caption:  var(--fw-regular)  var(--fs-12)/var(--lh-relaxed) var(--font-ui);\n  --text-meta:     var(--fw-medium)   var(--fs-11)/var(--lh-snug)    var(--font-ui);\n}\n\n/* Respect users who reduce motion — soften IG's like-pop & fades */\n@media (prefers-reduced-motion: reduce) {\n  :root {\n    --dur-fast: 1ms; /* @kind other */\n    --dur-base: 1ms; /* @kind other */\n    --dur-slow: 1ms; /* @kind other */\n    --ease-spring: var(--ease-out);\n  }\n}\n\n<\u002Fstyle>\n  <script src=\"fdd09da4-3f15-4417-ba35-190abeb52574\"><\u002Fscript>\n  <style>\n    body{margin:0;background:var(--bg-app,#fafafa);}\n    a{color:var(--ig-blue-link,#3897f0);text-decoration:none;}\n    a:hover{color:var(--ig-blue-deep,#004c8b);}\n    input,select,button{font-family:var(--font-ui,system-ui);}\n    input:focus,select:focus{outline:2px solid var(--ig-blue,#1fa1ff);outline-offset:-1px;border-radius:3px;}\n    @keyframes pfspin{to{transform:rotate(360deg);}}\n    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}\n    input[type=number]{-moz-appearance:textfield;appearance:textfield;}\n    /* ── 표 레이아웃(단일 출처: 헤더·행이 같은 클래스를 공유) ── */\n    .pf-tbl-scroll{overflow-x:auto;}\n    .pf-hold-row{display:grid;grid-template-columns:minmax(150px,1fr) 118px 82px 98px 98px 134px 56px 66px 24px;gap:8px;min-width:858px;}\n    .pf-analysis{display:grid;grid-template-columns:250px 1fr;gap:20px;}\n    .pf-num{font-variant-numeric:tabular-nums;}\n    /* ── STEP 섹션 뼈대(카드·라벨·제목·설명이 5개 섹션에 반복) ── *
