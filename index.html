0%로 분해해 집계<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pf-analysis\" style=\"padding:12px 18px 20px;align-items:start;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;\">\n          <div style=\"position:relative;width:190px;height:190px;\">\n            <svg viewBox=\"0 0 200 200\" style=\"width:100%;height:100%;\">\n              <sc-for list=\"{{ donutSegs }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <path d=\"{{ s.d }}\" stroke=\"{{ s.color }}\" stroke-width=\"30\" fill=\"none\"><\u002Fpath>\n              <\u002Fsc-for>\n            <\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;pointer-events:none;\">\n              <span style=\"font-size:10.5px;font-weight:600;letter-spacing:0.5px;color:var(--text-tertiary,#999);\">현재 배분<\u002Fspan>\n              <span class=\"pf-step-title\">{{ totalShort }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;\">\n            <sc-for list=\"{{ legendRows }}\" as=\"l\" hint-placeholder-count=\"4\">\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11.5px;\">\n                <span style=\"width:9px;height:9px;border-radius:2px;background:{{ l.color }};\"><\u002Fspan>{{ l.label }} <b>{{ l.pct }}<\u002Fb>\n              <\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;padding-top:4px;\">\n          <div style=\"display:grid;grid-template-columns:96px 1fr 120px;gap:10px;font-size:10.5px;font-weight:600;letter-spacing:0.4px;color:var(--text-tertiary,#999);text-transform:uppercase;\">\n            <span>자산군<\u002Fspan><span>현재 ■ vs 목표 ▢<\u002Fspan><span style=\"text-align:right;\">이탈 (현재−목표)<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ driftRows }}\" as=\"d\" hint-placeholder-count=\"5\">\n            <div style=\"display:grid;grid-template-columns:96px 1fr 120px;gap:10px;align-items:center;\">\n              <span style=\"font-size:12.5px;font-weight:600;\">{{ d.label }}<\u002Fspan>\n              <div style=\"display:flex;flex-direction:column;gap:3px;\">\n                <div style=\"height:12px;background:var(--bg-secondary,#efefef);border-radius:3px;overflow:hidden;\"><div style=\"height:100%;border-radius:3px;background:{{ d.color }};width:{{ d.curW }};\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"height:5px;background:var(--bg-secondary,#efefef);border-radius:3px;overflow:hidden;\"><div style=\"height:100%;border-radius:3px;background:var(--ig-gray-30,#c4c4c4);width:{{ d.tgtW }};\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;justify-content:flex-end;align-items:baseline;gap:6px;\">\n                <span class=\"pf-num\" style=\"font-size:11px;color:var(--text-tertiary,#999);\">{{ d.curPct }} → {{ d.tgtPct }}<\u002Fspan>\n                <span class=\"pf-num\" style=\"font-size:12.5px;font-weight:700;color:{{ d.diffColor }};min-width:52px;text-align:right;\">{{ d.diff }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 5. Actions ────────────────────────── -->\n    <section class=\"pf-card\">\n      <div style=\"padding:14px 18px 8px;display:flex;align-items:baseline;gap:10px;\">\n        <span class=\"pf-step\">STEP 5<\u002Fspan>\n        <span class=\"pf-step-title\">리밸런싱 액션<\u002Fspan>\n        <span class=\"pf-step-desc\">이탈 ±{{ bandStr }}%p 이상만 · 이탈 큰 순<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:4px 18px 14px;display:flex;flex-direction:column;gap:8px;\">\n        <sc-if value=\"{{ noActions }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:16px;border:1px solid var(--border-default,#dfdfe8);border-radius:8px;background:var(--bg-app,#fafafa);\">\n            <span style=\"font-size:16px;\">✓<\u002Fspan>\n            <span style=\"font-size:13px;color:var(--text-secondary,#6e6e6e);\">모든 자산군이 밴드 안에 있습니다 — 지금은 리밸런싱이 필요 없어요.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ actions }}\" as=\"a\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;align-items:flex-start;gap:14px;padding:13px 16px;border:1px solid var(--border-default,#dfdfe8);border-radius:8px;\">\n            <span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:var(--text-primary,#000);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;\">{{ a.n }}<\u002Fspan>\n            <div style=\"display:flex;flex-direction:column;gap:4px;min-width:0;\">\n              <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;\">\n                <span style=\"font-size:11px;font-weight:700;letter-spacing:0.5px;padding:3px 8px;border-radius:4px;background:{{ a.dirBg }};color:#fff;\">{{ a.dirLabel }}<\u002Fspan>\n                <span style=\"font-size:14px;font-weight:700;\">{{ a.title }}<\u002Fspan>\n                <span style=\"font-size:12px;color:var(--text-tertiary,#999);\">약 {{ a.amt }} 규모<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:12.5px;color:var(--text-secondary,#6e6e6e);\">{{ a.sub }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"margin-top:6px;padding:12px 16px;border-radius:8px;background:var(--bg-app,#fafafa);display:flex;flex-direction:column;gap:5px;\">\n          <span style=\"font-size:11px;font-weight:700;letter-spacing:0.6px;color:var(--text-tertiary,#999);\">체크포인트<\u002Fspan>\n          <span style=\"font-size:12.5px;color:var(--text-secondary,#6e6e6e);\">· 축소(매도)는 <b>연금저축·IRP·퇴직연금 계좌 안에서 먼저<\u002Fb> — 과세이연으로 세금 없이 조정 가능<\u002Fspan>\n          <span style=\"font-size:12.5px;color:var(--text-secondary,#6e6e6e);\">· 일반계좌 미국주식 매도는 <b>양도세(연 250만 원 공제)<\u002Fb>와 환율({{ fx }}원) 시점을 함께 고려<\u002Fspan>\n          <span style=\"font-size:12.5px;color:var(--text-secondary,#6e6e6e);\">· 확대는 신규 매수 대신 <b>배당·분배금 재투자와 월 적립금 배정<\u002Fb>으로 먼저 채우면 거래비용이 줄어요<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;driftBand&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 5, &quot;min&quot;: 1, &quot;max&quot;: 10, &quot;step&quot;: 0.5, &quot;unit&quot;: &quot;%p&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;리밸런싱&quot;}, &quot;comfortReading&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;표시&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.CLASSES = [\n      { key: 'growth', label: '성장주', color: '#515bd4' },\n      { key: 'dividend', label: '배당주', color: '#dd2a7b' },\n      { key: 'bond', label: '채권', color: '#1fa1ff' },\n      { key: 'gold', label: '금·원자재', color: '#f58529' },\n      { key: 'cash', label: '현금', color: '#999999' },\n      { key: 'realestate', label: '부동산', color: '#8134af' },\n      { key: 'mixed', label: '혼합(주식·채권)', color: '#6e6e6e' }\n    ];\n    // 배분 대상 자산군 — 혼합은 한 종목이 두 자산군에 걸쳐 있어 목표 비중의 단위가 될 수 없다.\n    // 도넛·드리프트·목표·액션이 전부 이 구성과 순서를 쓴다.\n    this.ALLOC = this.CLASSES.filter(c => c.key !== 'mixed');\n    // 계좌 — 종류·색·연금여부를 한 곳에서. 연금여부는 액션의 세금 안내가 갈리는 기준이다.\n    this.ACCOUNTS = [\n      { key: '일반', color: '#6e6e6e' },\n      { key: '연금저축', color: '#1fa1ff', pension: true },\n      { key: 'IRP', color: '#8134af', pension: true },\n      { key: '퇴직연금', color: '#004c8b', pension: true },\n      { key: 'ISA', color: '#dd2a7b' }\n    ];\n    // 목표 프리셋 — 라벨의 숫자는 값에서 파생한다(손으로 적으면 값과 조용히 어긋난다).\n    this.PRESETS = [\n      { name: '균형형', t: { growth: 30, dividend: 20, bond: 25, gold: 10, cash: 10, realestate: 5 } },\n      { name: '성장형', t: { growth: 45, dividend: 15, bond: 20, gold: 5, cash: 10, realestate: 5 } },\n      { name: '배당·안정형', t: { growth: 15, dividend: 30, bond: 30, gold: 10, cash: 10, realestate: 5 } }\n    ];\n    this.state = {\n      holdings: [],\n      target: { ...this.PRESETS[0].t },\n      fx: 1380,\n      extracting: false,\n      extractStatus: '',\n      extractError: null,\n      extractInfo: null,\n      fxUpdatedAt: null,\n      fxStatus: '',\n      loaded: false,\n      // 라이브 추출 프리뷰(STEP1) — 확인 버튼 전까지 STEP2 미반영\n      streamStage: '',            // '' | 'live'(스트리밍 중) | 'review'(최종·확인 대기)\n      streamRows: [],             // 표시용 행 dict 배열(중간 원시 또는 최종 보정본)\n      gateReport: null,           // {lines:[{kind,text}]} — 게이트 대조/보정 로그\n      streamPending: null,        // 확인 시 applySnapshot에 넘길 pending\n      streamNote: '',\n      // 에이전트 연결(헤더)\n      agentUrlInput: '',\n      connStatus: '○ 미설정',\n      connColor: '#9a9aa2',\n      // 현재가 재평가(STEP2)\n      capInput: '',\n      repriceMsg: '',\n      repriceSummary: null\n    };\n  }\n\n  componentDidMount() {\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('pf_rebalancer_v1') || 'null'); } catch (e) {}\n    // 시드(데모·옛 실계좌 id 's\\d+')는 복원하지 않는다 — 실제 사용자 데이터(id 'h…')만 남긴다.\n    // 이 게이트가 예전 방문 브라우저의 옛 실계좌도 화면에서 걷어낸다.\n    const holdings = (saved && Array.isArray(saved.holdings) ? saved.holdings : []).filter(h => !this.isSeed(h));\n    // 레거시 마이그레이션: avgCost 없던 기존 데이터는 원가·수량으로 매수평균가를 백필해 새 손익 기준에 태운다.\n    holdings.forEach(h => {\n      if (h.avgCost == null && h.cost != null && h.qty != null && h.qty > 0) {\n        h.avgCost = h.cost / h.qty; h.avgCost_src = 'computed:cost/qty';\n      }\n    });\n    if (holdings.length) {\n      this.setState({ holdings, target: saved.target || this.state.target, fx: saved.fx || 1380, loaded: true });\n    } else {\n      // 빈 시작 — 첫 방문자에게 아무것도 자동 노출하지 않는다. 데모는 '예시 데이터로 둘러보기' 버튼으로만.\n      this.setState({ loaded: true });\n    }\n    this.fetchFx();\n    // 에이전트 연결 상태(헤더) — 저장된 URL 반영 + 주기 핑\n    this.setState({ agentUrlInput: this.agentUrl() });\n    this.pingHealth();\n    this._healthTimer = setInterval(() => this.pingHealth(), 30000);\n  }\n\n  componentWillUnmount() {\n    if (this._healthTimer) clearInterval(this._healthTimer);\n  }\n\n  async fetchFx() {\n    this.setState({ fxStatus: '환율 갱신 중…' });\n    try {\n      const r = await fetch('https://open.er-api.com/v6/latest/USD');\n      const j = await r.json();\n      const krw = j && j.rates && j.rates.KRW;\n      if (!krw) throw new Error('no rate');\n      this.set({ fx: Math.round(krw * 10) / 10 });\n      this.setState({ fxUpdatedAt: Date.now(), fxStatus: '' });\n    } catch (e) {\n      this.setState({ fxStatus: '자동 갱신 실패 — 수동 입력 가능' });\n    }\n  }\n\n  timeAgo(t) {\n    if (!t) return '';\n    const m = Math.floor((Date.now() - t) / 60000);\n    if (m < 1) return '방금';\n    if (m < 60) return m + '분 전';\n    const h = Math.floor(m / 60);\n    if (h < 24) return h + '시간 전';\n    return Math.floor(h / 24) + '일 전';\n  }\n\n  sampleData() {\n    const now = Date.now(), old = now - 3 * 86400000;\n    let i = 0;\n    // 매수평균가는 원가·수량이 함께 있으면 도출(추출 경로와 동일 규약) — 데모가 평균가·주당 손익을 보여준다.\n    const mk = (broker, accountType, name, cls, currency, qty, price, value, cost, t) =>\n      ({ id: 's' + (++i), broker, accountType, name, cls, currency, qty, price, value, cost,\n         avgCost: (cost != null && qty) ? cost / qty : null,\n         avgCost_src: (cost != null && qty) ? 'computed:cost/qty' : '',\n         updatedAt: t });\n    // 예시 데이터 — 전부 허구다(실 계좌·종목·금액 아님). 자산군 7종·계좌 4종·USD/KRW를 고루 담아\n    // 데모가 도넛·그룹·평균가·손익 경로를 다 태운다. 수량 있는 행은 평균가가 뜨고, 연금(SOL)·현금(예수금)\n    // 행은 수량 없이 총원가 폴백/‘—’을 보여준다. qty×price는 각 행 평가금액을 보존(집계 불변). 버튼으로만 로드.\n    return [\n      mk('예시증권', 'IRP', 'KODEX 미국S&P500', 'growth', 'KRW', 100, 50000, null, 4500000, old),\n      mk('예시증권', 'IRP', 'TIGER 미국나스닥100', 'growth', 'KRW', 50, 60000, null, 2600000, old),\n      mk('예시증권', 'IRP', 'ACE KRX금현물', 'gold', 'KRW', 200, 10000, null, 1800000, old),\n      mk('예시증권', 'IRP', 'KODEX 국고채30년', 'bond', 'KRW', 25, 100000, null, 2550000, old),\n      mk('예시증권', 'IRP', 'TIGER 미국S&P500채권혼합', 'mixed', 'KRW', 40, 50000, null, 1950000, old),\n      mk('예시증권', '연금저축', 'SOL 미국배당다우존스', 'dividend', 'KRW', null, null, 3000000, 2800000, old),\n      mk('예시증권', '연금저축', '예수금', 'cash', 'KRW', null, null, 1000000, null, old),\n      mk('예시증권', 'ISA', 'TIGER 리츠부동산인프라', 'realestate', 'KRW', 200, 5000, null, 900000, old),\n      mk('해외예시', '일반', 'VOO 뱅가드 S&P500', 'growth', 'USD', 5, 500, null, 2000, now - 86400000 * 2),\n      mk('해외예시', '일반', 'SCHD 배당ETF', 'dividend', 'USD', 30, 28, null, 750, now - 86400000 * 2)\n    ];\n  }\n\n  persist() {\n    try {\n      // 시드(데모·옛 실계좌)는 디스크에 남기지 않는다 — 새로고침·재방문 시 되살아나지 않게.\n      const holdings = this.state.holdings.filter(h => !this.isSeed(h));\n      localStorage.setItem('pf_rebalancer_v1', JSON.stringify({\n        holdings, target: this.state.target, fx: this.state.fx\n      }));\n    } catch (e) {}\n  }\n\n  set(patch) { this.setState(patch, () => this.persist()); }\n\n  // 데모·옛 시드 행(id 's\\d+') — 저장·복원에서 제외한다. applySnapshot의 isDemo와 같은 규약.\n  isSeed(h) { return /^s\\d+$/.test(String(h.id)); }\n\n  // ---------- helpers ----------\n  krw(h) {\n    const native = (h.qty != null && h.price != null) ? h.qty * h.price : (h.value || 0);\n    return h.currency === 'USD' ? native * this.state.fx : native;\n  }\n  costKrw(h) {\n    if (h.cost == null) return null;\n    return h.currency === 'USD' ? h.cost * this.state.fx : h.cost;\n  }\n  // 매수평균가(주당)를 KRW로. avgCost는 추출 시 cost/qty로 동결 저장되거나 사용자가 직접 입력한다.\n  avgKrw(h) {\n    if (h.avgCost == null) return null;\n    return h.currency === 'USD' ? h.avgCost * this.state.fx : h.avgCost;\n  }\n  // 손익 기준 = 현재 수량에 대한 원가. 주당 평균가가 있으면 avg×현재수량(수량 편집에 정합),\n  // 없으면 총 매입금액(수량 null인 연금 화면 등)으로 폴백. 둘 다 없으면 null → 손익 '—'.\n  costBasisKrw(h) {\n    const a = this.avgKrw(h);\n    if (a != null && h.qty != null) return a * h.qty;\n    return this.costKrw(h);\n  }\n  fmtW(n) {\n    if (n == null || isNaN(n)) return '—';\n    return '₩' + Math.round(n).toLocaleString('ko-KR');\n  }\n  fmtShort(n) {\n    if (n >= 1e8) return '₩' + (n / 1e8).toFixed(2) + '억';\n    return '₩' + Math.round(n / 10000).toLocaleString('ko-KR') + '만';\n  }\n  fmtNum(n) { return n == null ? '' : Number(n).toLocaleString('ko-KR', { maximumFractionDigits: 2 }); }\n  // key를 가진 목록(CLASSES·ACCOUNTS·ALLOC) → key로 찾는 맵.\n  byKey(list) { const m = {}; list.forEach(x => m[x.key] = x); return m; }\n  // 추출 결과의 낯선 계좌명은 '일반'으로 — 아는 계좌는 ACCOUNTS가 단일 출처.\n  normAcct(a) { return this.ACCOUNTS.some(x => x.key === a) ? a : '일반'; }\n  parseNum(s) {\n    const v = parseFloat(String(s).replace(/[,₩$\\s]/g, ''));\n    return isNaN(v) ? null : v;\n  }\n\n  updateHolding(id, patch) {\n    this.set({ holdings: this.state.holdings.map(h => h.id === id ? { ...h, ...patch } : h) });\n  }\n\n  // ---------- extraction ----------\n  agentUrl() {\n    try { return (localStorage.getItem('pf_agent_url') || '').trim().replace(/\\/+$/, ''); } catch (e) { return ''; }\n  }\n\n  // 헤더의 에이전트 URL 입력 — 저장 + 연결 재확인. (fetch 인터셉트·더미키는 사이드카가 담당)\n  onAgentUrl(e) {\n    const u = (e.target.value || '').trim().replace(/\\/+$/, '');\n    try { localStorage.setItem('pf_agent_url', u); } catch (err) {}\n    this.setState({ agentUrlInput: u }, () => this.pingHealth());\n  }\n\n  // 에이전트 /health 실제 핑 → 헤더 연결 점.\n  async pingHealth() {\n    const base = this.agentUrl();\n    if (!base) { this.setState({ connStatus: '○ 미설정', connColor: '#9a9aa2' }); return; }\n    this.setState({ connStatus: '… 확인 중', connColor: '#8a8a93' });\n    try {\n      const ctl = ('AbortController' in window) ? new AbortController() : null;\n      const to = ctl ? setTimeout(() => ctl.abort(), 6000) : null;\n      const r = await fetch(base + '/health', { signal: ctl ? ctl.signal : undefined });\n      if (to) clearTimeout(to);\n      this.setState((r && r.ok)\n        ? { connStatus: '● 연결됨', connColor: '#1c9c5b' }\n        : { connStatus: '△ 응답없음', connColor: '#c88a1e' });\n    } catch (e) {\n      this.setState({ connStatus: '△ 응답없음', connColor: '#c88a1e' });\n    }\n  }\n\n  // 보유자산을 현재가로 재평가(에이전트 /reprice) — 수량 없는 종목은 캡처시점 종가로 역산(추정 표시).\n  async repriceNow() {\n    const base = this.agentUrl();\n    if (!base) { this.setState({ repriceMsg: '헤더에서 에이전트 URL을 입력하세요' }); return; }\n    const holdings = this.state.holdings;\n    if (!holdings.length) { this.setState({ repriceMsg: '보유자산이 없습니다 (먼저 추출/입력)' }); return; }\n    this.setState({ repriceMsg: '현재가 조회 중… (수량 추정 포함 수십 초)' });\n    try {\n      const payload = { holdings };\n      if (this.state.capInput) payload.captureDateTime = this.state.capInput + ':00+09:00';   // 비우면 서버가 EXIF 자동\n      const r = await fetch(base + '/reprice', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload) });\n      const j = await r.json();\n      if (j.error) throw new Error(j.error);\n      const byId = {}; (j.holdings || []).forEach(h => { if (h.id != null) byId[h.id] = h; });\n      const now = Date.now(), est = [];\n      const merged = holdings.map(h => {\n        const u = byId[h.id]; if (!u) return h;\n        if (u.confidence && String(u.confidence).indexOf('estimated') === 0 && u.qty != null) est.push({ name: h.name, qty: u.qty });\n        return { ...h, qty: u.qty, price: u.price, value: u.value, currency: u.currency || h.currency, symbol: u.symbol, confidence: u.confidence, updatedAt: now };\n      });\n      const patch = { holdings: merged };\n      if (j.fx) patch.fx = Math.round(j.fx * 10) / 10;\n      this.set(patch);\n      this.setState({ repriceMsg: '재평가 완료' + (est.length ? (' · 추정 ' + est.length + '건') : ''),\n        repriceSummary: { at: now, fx: patch.fx || this.state.fx, est, capUsed: j.captureDateTime } });\n    } catch (e) {\n      this.setState({ repriceMsg: '실패: ' + (e && e.message || e) });\n    }\n  }\n\n  repriceSummaryText() {\n    const s = this.state.repriceSummary; if (!s) return '';\n    const fmt = t => { if (!t) return '—'; const d = new Date(t); return isNaN(d) ? String(t) : d.toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }); };\n    let out = '수량 기준 ' + fmt(s.capUsed) + ' · 평가 기준 ' + fmt(s.at) + ' (환율 ' + s.fx + ')';\n    if (s.est && s.est.length) out += ' · 추정수량 ' + s.est.length + '건';\n    return out;\n  }\n\n  // ---------- 라이브 추출 프리뷰(STEP1) ----------\n  // 한 행(원시 dict 또는 최종 보정본)을 프리뷰 표시용으로. 중간·최종이 같은 매핑을 탄다(단일 출처).\n  streamDisplay(h) {\n    const clsMap = { '성장주': 'growth', '배당주': 'dividend', '채권': 'bond', '금·원자재': 'gold', '현금': 'cash', '부동산': 'realestate' };\n    const cls = h.cls || clsMap[h.assetClass] || (String(h.assetClass || '').indexOf('혼합') >= 0 ? 'mixed' : 'growth');\n    const cmap = this.byKey(this.CLASSES);\n    const qty = this.parseNum(h.qty), value = this.parseNum(h.value);\n    const corrected = String(h.value_src || '').indexOf('보정') >= 0;\n    return {\n      name: h.name || '(이름 없음)',\n      acct: (h.broker || '미상') + ' · ' + this.normAcct(h.accountType),\n      clsColor: (cmap[cls] || cmap.growth).color,\n      qtyStr: qty == null ? '—' : this.fmtNum(qty),\n      valueStr: value == null ? '—' : this.fmtNum(value),\n      cur: h.currency === 'USD' ? '$' : '₩',\n      corrected, correctedTitle: corrected ? '게이트가 계좌합계 대조로 자릿수 보정한 행' : ''\n    };\n  }\n\n  // 중간 원시 행을 한 행씩 프리뷰에 흘려보낸다(써지듯). done 되면 pump가 멈춘다.\n  _pushStream(rawRows) {\n    this._revealQ = (this._revealQ || []).concat(rawRows || []);\n    if (this._pumping) return;\n    this._pumping = true;\n    const step = () => {\n      if (!this._revealQ.length || this.state.streamStage !== 'live') { this._pumping = false; return; }\n      const next = this._revealQ.shift();\n      this.setState({ streamRows: [...(this.state.streamRows || []), next] });\n      setTimeout(step, 90);\n    };\n    step();\n  }\n\n  // 최종 도착 — 남은 reveal 취소하고 게이트 보정본을 한 번에 부드럽게 표시 + 확인 대기.\n  _finishStream(finalRows, gate, pending, note) {\n    this._revealQ = [];\n    this.setState({\n      extracting: false, extractStatus: '',\n      streamStage: 'review',\n      streamRows: finalRows,\n      gateReport: this.buildGateReport(gate),\n      streamPending: pending,\n      streamNote: note || ''\n    });\n  }\n\n  // 게이트 리포트 → 로그 줄. repairs(실제 보정)를 먼저, 중복 아닌 warnings를 뒤에.\n  buildGateReport(gate) {\n    const reps = (gate && gate.repairs) || [];\n    const warns = (gate && gate.warnings) || [];\n    const lines = [];\n    reps.forEach(t => lines.push({ kind: 'repair', text: t }));\n    warns.forEach(w => { if (reps.indexOf(w) < 0) lines.push({ kind: 'warn', text: w }); });\n    return { lines };\n  }\n\n  // 확인 버튼 — 프리뷰를 STEP2에 반영하고 정리.\n  commitStream() {\n    const pending = this.state.streamPending || [];\n    const note = this.state.streamNote || '';\n    this.setState({ streamStage: '', streamRows: [], gateReport: null, streamPending: null, streamNote: '' },\n      () => { if (pending.length) this.applySnapshot(pending, note); });\n  }\n\n  discardStream() {\n    this._revealQ = [];\n    this.setState({ streamStage: '', streamRows: [], gateReport: null, streamPending: null, streamNote: '', extractStatus: '', extracting: false });\n  }\n\n  // 데모용 더미 추출 — 에이전트 없이도 라이브 스트리밍 + 게이트 자릿수 보정을 눈으로 보게 한다.\n  // 실제 경로와 동일한 _pushStream(중간 원시행)→_finishStream(게이트 보정본) 파이프라인을 그대로 태운다.\n  // 응답은 전부 허구(픽션). 마지막 원시행 '예수금'은 자릿수 오독(4,500)으로 흘러가고, 계좌합계 대조\n  // 게이트가 45,000으로 보정하는 전환을 재현한다.\n  demoStream() {\n    if (this.state.streamStage === 'live') return;\n    // 화면 1 (가온증권 일반) — 정상 판독\n    const raw1 = [\n      { broker: '가온증권', accountType: '일반', name: '한빛반도체', assetClass: '성장주', currency: 'KRW', qty: 10, price: 85000, value: 850000, cost: 700000, confidence: 'high' },\n      { broker: '가온증권', accountType: '일반', name: '새봄금융지주', assetClass: '배당주', currency: 'KRW', qty: 20, price: 30000, value: 600000, cost: 640000, confidence: 'high' }\n    ];\n    // 화면 2 (새롬투자 연금저축) — 예수금 평가금액이 자릿수 누락(45,000 → 4,500)으로 판독됨\n    const raw2 = [\n      { broker: '새롬투자', accountType: '연금저축', name: '국고채 24-3', assetClass: '채권', currency: 'KRW', qty: 120, price: 10000, value: 1200000, cost: 1195000, confidence: 'high' },\n      { broker: '새롬투자', accountType: '연금저축', name: '예수금', assetClass: '현금', currency: 'KRW', qty: null, price: null, value: 4500, confidence: 'high' }\n    ];\n    const repair = '새롬투자 연금저축: 예수금 평가금액 4,500 → 45,000 (계좌합계 1,245,000와 일치하도록 자릿수 보정 — 오독 교정)';\n    const gate = { warnings: [repair], repairs: [repair] };\n    // 게이트 보정 완료본 — 예수금이 45,000으로 교정되고 value_src에 '보정' 태그가 붙는다.\n    const finalRows = [\n      raw1[0], raw1[1], raw2[0],\n      { broker: '새롬투자', accountType: '연금저축', name: '예수금', assetClass: '현금', currency: 'KRW', qty: null, price: null, value: 45000, confidence: 'high', value_src: 'screen(계좌합계 대조로 자릿수 보정)' }\n    ];\n    const clsMap = { '성장주': 'growth', '배당주': 'dividend', '채권': 'bond', '금·원자재': 'gold', '현금': 'cash', '부동산': 'realestate' };\n    const pending = finalRows.map((h, j) => ({\n      id: 'p' + Date.now() + '_' + j,\n      broker: h.broker, accountType: this.normAcct(h.accountType), name: h.name,\n      cls: clsMap[h.assetClass] || 'growth', currency: 'KRW',\n      qty: h.qty != null ? Number(h.qty) : null,\n      price: h.price != null ? Number(h.price) : null,\n      value: h.value != null ? Number(h.value) : null,\n      cost: h.cost != null ? Number(h.cost) : null,\n      value_src: h.value_src || '', confidence: 0.9, checkFail: false\n    }));\n    this._revealQ = []; this._pumping = false;\n    this.setState({ extracting: true, extractError: null, extractInfo: null,\n      streamStage: 'live', streamRows: [], gateReport: null, streamPending: null, streamNote: '',\n      extractStatus: '예시 · 화면 2장 분석 중… (1/2)' });\n    this._pushStream(raw1);\n    setTimeout(() => { if (this.state.streamStage === 'live') {\n      this.setState({ extractStatus: '예시 · 화면 2장 분석 중… (2/2)' }); this._pushStream(raw2);\n    } }, 1100);\n    setTimeout(() => { if (this.state.streamStage === 'live') this._finishStream(finalRows, gate, pending, ''); }, 2400);\n  }\n\n  // 로컬 에이전트 경로: 화면을 **한 번에** 보내 서버가 종합한다(화면 간 교차검증이 필요하기 때문).\n  // 서버가 계좌합계 대조 게이트 · 증권사 정규화 · 수량 사다리(화면→계좌간→캡처일 종가)까지 마친\n  // 결과를 그대로 받는다. 브라우저가 다시 파싱하면 그 근거가 전부 버려진다.\n  async extractViaAgent(files, base) {\n    this.setState({ extracting: true, extractError: null, extractInfo: null,\n      streamStage: 'live', streamRows: [], gateReport: null, streamPending: null,\n      extractStatus: '화면 ' + files.length + '장 분석 중… (로컬 에이전트)' });\n    this._revealQ = []; this._pumping = false;\n    const images = await Promise.all(files.map(f => new Promise((res, rej) => {\n      const r = new FileReader();\n      r.onload = () => res(String(r.result).replace(/^data:.*?;base64,/, ''));\n      r.onerror = rej;\n      r.readAsDataURL(f);\n    })));\n    const sub = await fetch(base + '/extract/batch/submit', {\n      method: 'POST', headers: { 'content-type': 'application/json' },\n      body: JSON.stringify({ images })\n    }).then(r => r.json());\n    if (!sub || !sub.id) throw new Error((sub && sub.error) || '제출 실패');\n    let res = null, seen = 0;\n    for (let i = 0; i < 900 && !res; i++) {                 // 장당 수십 초 — 넉넉히 폴링\n      await new Promise(r => setTimeout(r, 2000));\n      const j = await fetch(base + '/extract/batch/result?id=' + sub.id).then(r => r.json()).catch(() => null);\n      if (!j) continue;\n      if (j.status === 'done') { res = j; break; }          // 서버가 결과를 최상위에 펼쳐 줌\n      if (j.status === 'error') throw new Error(j.error || '추출 실패');\n      // 진행 중: 화면이 끝날 때마다 도착한 원시 행을 라이브로 흘려보낸다(써지듯)\n      const rows = (j.progress && j.progress.rows) || [];\n      if (rows.length > seen) { this._pushStream(rows.slice(seen)); seen = rows.length; }\n      const p = j.progress || {};\n      this.setState({ extractStatus: '화면 분석 중… (' + (p.done || 0) + '/' + (p.total || files.length) + ')' });\n    }\n    if (!res) throw new Error('시간 초과');\n    const clsMap = { '성장주': 'growth', '배당주': 'dividend', '채권': 'bond', '금·원자재': 'gold', '현금': 'cash', '부동산': 'realestate' };\n    const confNum = { exact: 1, high: 0.9, estimated: 0.8, 'estimated-low': 0.75, unreproducible: 0.6 };\n    const finalHoldings = res.holdings || [];\n    const pending = finalHoldings.map((h, j) => ({\n      id: 'p' + Date.now() + '_' + j,\n      broker: h.broker || '미상',\n      accountType: this.normAcct(h.accountType),\n      name: h.name || '', cls: clsMap[h.assetClass] || (String(h.assetClass || '').indexOf('혼합') >= 0 ? 'mixed' : 'growth'),\n      currency: h.currency === 'USD' ? 'USD' : 'KRW',\n      qty: h.qty != null ? Number(h.qty) : null,\n      price: h.price != null ? Number(h.price) : null,\n      value: h.value != null ? Number(h.value) : null,\n      cost: h.cost != null ? Number(h.cost) : null,\n      qty_src: h.qty_src || '', price_src: h.price_src || '', value_src: h.value_src || '',\n      confidence: typeof h.confidence === 'number' ? h.confidence : (confNum[h.confidence] || 0.9),\n      checkFail: false\n    }));\n    if (!pending.length) throw new Error('표를 찾지 못함');\n    const warns = (res.gate && res.gate.warnings) || [];\n    // 최종(게이트 보정 완료) 한 번에 부드럽게 표시 + 확인 버튼 대기 (STEP2 반영은 확인 시)\n    this._finishStream(finalHoldings, res.gate || {}, pending,\n      warns.length ? ' · ⚠ 게이트 경고 ' + warns.length + '건(' + warns[0].slice(0, 60) + '…)' : '');\n  }\n\n  async extractFiles(fileList) {\n    const files = Array.from(fileList || []).filter(f => f.type.startsWith('image/'));\n    if (!files.length) return;\n    const base = this.agentUrl();\n    if (base) {\n      try { return await this.extractViaAgent(files, base); }\n      catch (e) {\n        this.setState({ extracting: false, extractStatus: '', streamStage: '', streamRows: [],\n          extractError: '에이전트 추출 실패 — ' + (e.message || e) });\n        return;\n      }\n    }\n    this.setState({ extracting: true, extractError: null, extractInfo: null,\n      streamStage: 'live', streamRows: [], gateReport: null, streamPending: null,\n      extractStatus: '이미지 분석 중… (0/' + files.length + ')' });\n    this._revealQ = []; this._pumping = false;\n    const newPending = [];\n    try {\n      for (let idx = 0; idx < files.length; idx++) {\n        this.setState({ extractStatus: '이미지 분석 중… (' + (idx + 1) + '/' + files.length + ')' });\n        const dataUrl = await new Promise((res, rej) => {\n          const r = new FileReader();\n          r.onload = () => res(r.result); r.onerror = rej;\n          r.readAsDataURL(files[idx]);\n        });\n        const m = /^data:(.*?);base64,(.*)$/.exec(dataUrl);\n        const text = await this.callClaude({\n          model: 'claude-sonnet-4-5',\n          max_tokens: 4000,\n          messages: [{\n            role: 'user',\n            content: [\n              { type: 'image', source: { type: 'base64', media_type: m[1], data: m[2] } },\n              { type: 'text', text: this.extractPrompt() }\n            ]\n          }]\n        });\n        const jsonStr = (text.match(/\\[[\\s\\S]*\\]/) || [null])[0];\n        if (!jsonStr) throw new Error('구조화 실패');\n        const rows = JSON.parse(jsonStr);\n        const screenPending = rows.map((r, j) => {\n          const clsMap = { '성장주': 'growth', '배당주': 'dividend', '채권': 'bond', '금·원자재': 'gold', '현금': 'cash', '부동산': 'realestate' };\n          const cls = clsMap[r.assetClass] || (String(r.assetClass || '').indexOf('혼합') >= 0 ? 'mixed' : 'growth');\n          const qty = r.qty != null ? Number(r.qty) : null;\n          const price = r.price != null ? Number(r.price) : null;\n          const value = r.value != null ? Number(r.value) : null;\n          // cross-check: qty*price vs value\n          let checkFail = false;\n          if (qty != null && price != null && value != null && value > 0) {\n            checkFail = Math.abs(qty * price - value) / value > 0.02;\n          }\n          return {\n            id: 'p' + Date.now() + '_' + idx + '_' + j,\n            broker: r.broker || '미상', accountType: this.normAcct(r.accountType),\n            name: r.name || '', cls,\n            currency: r.currency === 'USD' ? 'USD' : 'KRW',\n            qty, price, value, cost: r.cost != null ? Number(r.cost) : null,\n            confidence: typeof r.confidence === 'number' ? r.confidence : 0.9,\n            checkFail\n          };\n        });\n        newPending.push(...screenPending);\n        this._pushStream(screenPending);          // 화면 하나 끝날 때마다 라이브 표시(순차)\n      }\n      if (!newPending.length) throw new Error('표를 찾지 못함');\n      // 게이트 없는 경로 — 최종 = 추출 그대로. 확인 버튼으로 STEP2 반영.\n      this._finishStream(newPending, {}, newPending, '');\n    } catch (e) {\n      this.setState({ extracting: false, extractStatus: '', streamStage: '', streamRows: [],\n        extractError: '추출에 실패했어요 — 표가 선명하게 보이는 스크린샷으로 다시 시도해 주세요. (' + (e.message || e) + ')' });\n    }\n  }\n\n  // 스냅샷 처리: 스크린샷에 나타난 (증권사·계좌) 범위는 그 시점의 전체 잔고로 간주\n  // → 매칭 종목 갱신 · 새 종목 추가 · 스크린샷에 없는 종목은 제거 (다른 계좌·직접입력 자산은 건드리지 않음)\n  // 예외: 데모 시드는 실데이터가 들어오는 순간 전부 치운다 — 시드 계좌는 실계좌와 스코프가 안 겹쳐서\n  // 스코프 규칙만으로는 살아남고, 추출 결과가 기존 표 아래에 덧붙는 것처럼 보인다.\n  applySnapshot(newPending, extraNote) {\n    {\n      const isDemo = h => /^s\\d+$/.test(String(h.id));   // sampleData()만 쓰는 id 꼴\n      const norm = s => String(s || '').replace(/[\\s()\\-·.,]/g, '').toLowerCase();\n      const scopeOf = x => norm(x.broker) + '|' + x.accountType;\n      const scopes = new Set(newPending.map(scopeOf));\n      let holdings = this.state.holdings.map(h => ({ ...h }));\n      let updated = 0, added = 0, lowConf = 0;\n      newPending.forEach(p => {\n        if (p.confidence < 0.8 || p.checkFail) lowConf++;\n        const h = holdings.find(x => scopeOf(x) === scopeOf(p) && norm(x.name) === norm(p.name) && norm(p.name).length > 1);\n        if (h) {\n          if (p.qty != null) h.qty = p.qty;\n          if (p.price != null) h.price = p.price;\n          if (p.value != null) h.value = p.value;\n          // 원가가 새로 들어올 때만 매수평균가를 재동결(같은 스냅샷의 cost·qty 쌍 기준) — 수량만 갱신되면 avg 유지.\n          if (p.cost != null) {\n            h.cost = p.cost;\n            h.avgCost = (h.qty != null && h.qty > 0) ? h.cost / h.qty : null;\n            h.avgCost_src = h.avgCost != null ? 'computed:cost/qty' : '';\n          }\n          // 출처(추정인지 화면값인지)는 값과 함께 움직여야 한다 — 값만 갱신하면 칩이 거짓말을 한다\n          h.qty_src = p.qty_src || ''; h.price_src = p.price_src || ''; h.value_src = p.value_src || '';\n          h.updatedAt = Date.now();\n          h._seen = true;\n          // 데모 행이 실값으로 갱신되면 더는 데모가 아니다 — id를 실자산 꼴로 바꿔 다음 스냅샷의 시드 청소를 면한다\n          if (isDemo(h)) h.id = 'h' + Date.now() + Math.random().toString(36).slice(2, 6);\n          updated++;\n        } else {\n          holdings.push({\n            id: 'h' + Date.now() + Math.random().toString(36).slice(2, 6),\n            broker: p.broker, accountType: p.accountType, name: p.name, cls: p.cls,\n            currency: p.currency, qty: p.qty, price: p.price, value: p.value, cost: p.cost,\n            avgCost: (p.cost != null && p.qty != null && p.qty > 0) ? p.cost / p.qty : null,\n            avgCost_src: (p.cost != null && p.qty != null && p.qty > 0) ? 'computed:cost/qty' : '',\n            qty_src: p.qty_src || '', price_src: p.price_src || '', value_src: p.value_src || '',\n            updatedAt: Date.now(), _seen: true\n          });\n          added++;\n        }\n      });\n      const before = holdings.length;\n      holdings = holdings.filter(h => !isDemo(h) && (!scopes.has(scopeOf(h)) || h._seen || h.broker === '직접입력'));\n      const removed = before - holdings.length;\n      holdings.forEach(h => { delete h._seen; });\n      this.set({ holdings });\n      this.setState({\n        extracting: false, extractStatus: '',\n        extractInfo: '스냅샷 반영 완료 — 갱신 ' + updated + ' · 신규 ' + added + (removed ? ' · 제거 ' + removed : '') +\n          (lowConf ? ' · ⚠ 확신 낮은 항목 ' + lowConf + '건은 표에서 값을 확인하세요' : '') + (extraNote || '')\n      });\n    }\n  }\n\n  async callClaude(body) {\n    // 프로토타입 환경: 내장 Claude / 배포(standalone) 환경: 사용자 API 키로 직접 호출\n    if (window.claude && window.claude.complete) return window.claude.complete(body);\n    let key = '';\n    try { key = localStorage.getItem('pf_anthropic_key') || ''; } catch (e) {}\n    if (!key) {\n      key = (window.prompt('배포 버전에서 AI 추출을 쓰려면 Anthropic API 키가 필요합니다.\\nconsole.anthropic.com에서 발급 — 키는 이 브라우저(localStorage)에만 저장되고 외부로 전송되지 않습니다.') || '').trim();\n      if (!key) throw new Error('API 키가 없어 추출을 중단했어요');\n      try { localStorage.setItem('pf_anthropic_key', key); } catch (e) {}\n    }\n    const r = await fetch('https://api.anthropic.com/v1/messages', {\n      method: 'POST',\n      headers: {\n        'content-type': 'application/json',\n        'x-api-key': key,\n        'anthropic-version': '2023-06-01',\n        'anthropic-dangerous-direct-browser-access': 'true'\n      },\n      body: JSON.stringify(body)\n    });\n    if (!r.ok) {\n      if (r.status === 401) { try { localStorage.removeItem('pf_anthropic_key'); } catch (e) {} }\n      throw new Error('API 오류 ' + r.status + (r.status === 401 ? ' — 키가 잘못되어 삭제했어요. 다시 시도하세요' : ''));\n    }\n    const j = await r.json();\n    return (j.content || []).filter(c => c.type === 'text').map(c => c.text).join('');\n  }\n\n  extractPrompt() {\n    return '증권사 앱 스크린샷에서 보유자산 표를 추출하라. 먼저 증권사와 화면 유형(일반/연금저축/IRP/퇴직연금/ISA)을 파악한 뒤, 각 보유 행을 JSON 배열로만 출력하라. 다른 텍스트·코드펜스 금지.\\n' +\n      '스키마: [{\"broker\":\"증권사명\",\"accountType\":\"일반|연금저축|IRP|퇴직연금|ISA\",\"name\":\"상품명\",\"assetClass\":\"성장주|배당주|채권|금·원자재|현금|부동산|혼합(주식·채권)\",\"currency\":\"KRW|USD\",\"qty\":수량 또는 null,\"price\":현재가 또는 null,\"value\":평가금액 또는 null,\"cost\":매입원금 또는 null,\"confidence\":0~1}]\\n' +\n      '규칙: (1) 화면에 없는 값은 null — 절대 추측 금지. (2) 숫자는 쉼표 제거한 순수 숫자. (3) 수량 없이 매입원금/평가금액만 있는 화면(연금 등)은 value·cost만 채워라. (4) 합계·헤더 행 제외. (5) assetClass는 상품명으로 판단: 나스닥/S&P/성장/테크→성장주, 고배당/배당→배당주, 채권→채권, 금현물/원자재→금·원자재, 현금성/예수금/CMA→현금, 리츠→부동산, 채권혼합→혼합(주식·채권). (6) 값이 흐릿하거나 잘렸으면 해당 행 confidence를 0.7 이하로.';\n  }\n\n  // ---------- allocation math ----------\n  rollup() {\n    const by = { growth: 0, dividend: 0, bond: 0, gold: 0, cash: 0, realestate: 0 };\n    let total = 0;\n    this.state.holdings.forEach(h => {\n      const v = this.krw(h);\n      total += v;\n      if (h.cls === 'mixed') { by.dividend += v * 0.5; by.bond += v * 0.5; }\n      else if (by[h.cls] != null) by[h.cls] += v;\n      else by.growth += v;\n    });\n    return { by, total };\n  }\n\n  arcPath(cx, cy, r, a0, a1) {\n    const p = a => [cx + r * Math.cos(a), cy + r * Math.sin(a)];\n    const [x0, y0] = p(a0), [x1, y1] = p(a1);\n    const large = a1 - a0 > Math.PI ? 1 : 0;\n    return 'M' + x0.toFixed(2) + ' ' + y0.toFixed(2) + ' A' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x1.toFixed(2) + ' ' + y1.toFixed(2);\n  }\n\n  renderVals() {\n    const S = this.state;\n    const band = Number(this.props.driftBand ?? 5);\n    const { by, total } = this.rollup();\n    const classOpts = this.CLASSES.map(c => ({ key: c.key, label: c.label }));\n    const cmap = this.byKey(this.CLASSES);\n    const amap = this.byKey(this.ACCOUNTS);\n    const keys = this.ALLOC.map(c => c.key);\n    // 구획들이 암묵적 클로저로 공유하던 값을 한 묶음으로 드러낸다 — 각 build*가 뭘 쓰는지 인자로 보인다.\n    const ctx = { S, by, total, keys, cmap, amap, band };\n\n    // --- header (손익 합산은 6줄뿐이라 여기 남긴다) ---\n    let plSum = 0, costSum = 0;\n    S.holdings.forEach(h => {\n      const c = this.costBasisKrw(h);\n      if (c != null) { plSum += this.krw(h) - c; costSum += c; }\n    });\n    const hasBasis = costSum > 0;                              // 원가 기준이 하나도 없으면 손익은 '알 수 없음'\n    const plPct = hasBasis ? (plSum / costSum * 100) : 0;\n\n    // --- account chips (3줄) ---\n    const acctTot = {};\n    S.holdings.forEach(h => { acctTot[h.accountType] = (acctTot[h.accountType] || 0) + this.krw(h); });\n    const acctChips = Object.keys(acctTot).map(k => ({ label: k, value: this.fmtShort(acctTot[k]) }));\n\n    const rows = this.buildHoldingRows(ctx);\n    const { donutSegs, legendRows } = this.buildDonut(ctx);\n    const driftRows = this.buildDrift(ctx);\n    const { targetRows, targetSum, presets } = this.buildTarget(ctx);\n    const actions = this.buildActions(ctx);\n\n    return {\n      readingAttr: this.props.comfortReading ? 'comfort' : '',\n      fx: S.fx,\n      onFxChange: e => this.set({ fx: this.parseNum(e.target.value) || S.fx }),\n      fxMeta: S.fxStatus || (S.fxUpdatedAt ? '자동 · ' + this.timeAgo(S.fxUpdatedAt) : '저장값'),\n      fxMetaColor: S.fxStatus ? '#ed4956' : 'var(--text-tertiary,#999)',\n      onFxRefresh: () => this.fetchFx(),\n      // 입력 확정: 엔터 = blur → 기존 onchange 커밋\n      onKeyEnter: e => { if (e.key === 'Enter') e.target.blur(); },\n      // 에이전트 연결(헤더)\n      agentUrlInput: S.agentUrlInput || '',\n      onAgentUrl: e => this.onAgentUrl(e),\n      connStatus: S.connStatus, connColor: S.connColor,\n      // 현재가 재평가(STEP2)\n      capInput: S.capInput || '',\n      onCapChange: e => this.setState({ capInput: e.target.value }),\n      onReprice: () => this.repriceNow(),\n      repriceMsg: S.repriceMsg, hasRepriceMsg: !!S.repriceMsg,\n      repriceSummaryText: this.repriceSummaryText(), hasRepriceSummary: !!S.repriceSummary,\n      // 라이브 추출 프리뷰(STEP1)\n      streamRows: (S.streamRows || []).map(h => this.streamDisplay(h)),\n      streamHasRows: (S.streamRows || []).length > 0,\n      streamLive: S.streamStage === 'live',\n      streamReview: S.streamStage === 'review',\n      streamStatusText: S.streamStage === 'live' ? (S.extractStatus || '분석 중…')\n        : (S.streamStage === 'review' ? ('추출 ' + (S.streamRows || []).length + '건 · 확인 후 반영') : ''),\n      gateLines: (S.gateReport && S.gateReport.lines) || [],\n      hasGate: !!(S.gateReport && S.gateReport.lines && S.gateReport.lines.length),\n      onConfirmStream: () => this.commitStream(),\n      onDiscardStream: () => this.discardStream(),\n      hasInfo: !!S.extractInfo, extractInfo: S.extractInfo,\n      totalStr: this.fmtW(total),\n      totalShort: this.fmtShort(total),\n      plStr: hasBasis ? ((plSum >= 0 ? '+' : '') + this.fmtW(plSum).replace('₩-', '-₩') + ' (' + (plPct >= 0 ? '+' : '') + plPct.toFixed(1) + '%)') : '—',\n      plColor: hasBasis ? (plSum >= 0 ? '#ed4956' : '#3897f0') : '#999',\n      acctChips,\n      extracting: S.extracting, notExtracting: !S.extracting,\n      extractStatus: S.extractStatus,\n      hasError: !!S.extractError, extractError: S.extractError,\n      onFiles: e => { this.extractFiles(e.target.files); e.target.value = ''; },\n      onDrop: e => { e.preventDefault(); this.extractFiles(e.dataTransfer.files); },\n      onDragOver: e => e.preventDefault(),\n      onLoadDemo: () => this.set({ holdings: this.sampleData() }),\n      onDemoStream: () => this.demoStream(),\n      classOpts,\n      rows,\n      onAddManual: () => this.set({\n        holdings: [...S.holdings, {\n          id: 'h' + Date.now(), broker: '직접입력', accountType: '일반', name: '새 자산 (이름 수정)',\n          cls: 'realestate', currency: 'KRW', qty: null, price: null, value: 0, cost: null, updatedAt: Date.now()\n        }]\n      }),\n      donutSegs, legendRows, driftRows,\n      targetRows, targetSum, sumColor: targetSum === 100 ? '#1fa1ff' : '#ed4956',\n      presets,\n      bandStr: String(band),\n      actions, noActions: actions.length === 0\n    };\n  }\n\n  // (증권사·계좌)별로 묶은 보유행 — 각 그룹 앞에 계좌 헤더행이 들어간다.\n  buildHoldingRows(ctx) {\n    const { S, total, cmap, amap } = ctx;\n    // 출처 태그 → 짧은 라벨(칩). 없으면 칩 미표시.\n    // 에이전트는 근거를 자세히 적어 보낸다('derived:cross-account(27,400)') — 칩엔 종류만 접두어로 표시.\n    const srcChip = s => {\n      s = String(s || '');\n      if (!s) return '';\n      if (s.indexOf('cross-account') >= 0) return 'cross';\n      if (s.indexOf('capture-close') >= 0) return 'est';\n      if (s.startsWith('screen')) return 'screen';\n      if (s === 'manual') return 'manual';\n      if (s.startsWith('computed')) return 'calc';\n      if (s.startsWith('reprice')) return 'live';\n      if (s === 'cash') return 'cash';\n      return s.slice(0, 10);\n    };\n    // 검산: 수량×현재가 vs 화면 평가금액. 이 대조는 **추출 시점의 스크린샷 값들**끼리만 의미가 있다.\n    // 사용자가 수량·현재가·평가금액을 직접 고치면(출처 manual) 그 값을 신뢰하고 검산하지 않는다 —\n    // 예: 현재가를 시장가로 갱신하면 qty×price가 스크린샷 평가금액과 벌어지는 게 정상이다.\n    const chkGap = h => (h.qty != null && h.price != null && h.value != null && h.value > 0)\n      ? Math.abs(h.qty * h.price - h.value) / h.value : 0;\n    const mkRow = h => {\n      const v = this.krw(h);\n      const c = this.costBasisKrw(h);\n      const pl = c != null && c > 0 ? (v - c) / c * 100 : null;\n      const hasQP = h.qty != null && h.price != null;\n      const anyManual = h.qty_src === 'manual' || h.price_src === 'manual' || h.value_src === 'manual';\n      const gap = chkGap(h);\n      const stale = Date.now() - (h.updatedAt || 0) > 86400000;\n      const vSrc = h.value_src || h.price_src || '';\n      return {\n        isHeader: false, isHolding: true,\n        id: h.id, broker: h.broker, accountType: h.accountType,\n        acctColor: (amap[h.accountType] || amap['일반']).color,\n        name: h.name, cls: h.cls, clsColor: (cmap[h.cls] || cmap.growth).color,\n        qty: h.qty == null ? '' : this.fmtNum(h.qty),\n        qtySrc: srcChip(h.qty_src), hasQtySrc: !!h.qty_src,\n        price: h.price == null ? '' : this.fmtNum(h.price),\n        cur: h.currency === 'USD' ? '$' : '₩',\n        avgInput: h.avgCost == null ? '' : this.fmtNum(h.avgCost),\n        avgSrc: srcChip(h.avgCost_src), hasAvgSrc: !!h.avgCost_src,\n        hasQP, noQP: !hasQP,\n        valueStr: this.fmtW(v),\n        valueInput: h.value == null ? '' : this.fmtNum(h.value),\n        valueSrc: srcChip(vSrc), hasValueSrc: !!vSrc,\n        mismatch: gap > 0.02 && !anyManual,\n        mismatchTitle: '검산 불일치 — 수량×현재가 ' + this.fmtNum(Math.round(h.qty * h.price)) +\n          ' vs 화면 평가금액 ' + this.fmtNum(h.value) + ' (' + (gap * 100).toFixed(1) + '% 차이). 표엔 수량×현재가가 표시됩니다 — 값을 확인하세요',\n        weightStr: total > 0 ? (v / total * 100).toFixed(1) + '%' : '—',\n        plStr: pl == null ? '—' : (pl >= 0 ? '+' : '') + pl.toFixed(1) + '%',\n        plColor: pl == null ? '#999' : pl >= 0 ? '#ed4956' : '#3897f0',\n        staleColor: stale ? '#f5a623' : 'transparent',\n        staleTitle: stale ? '시세가 24시간 이상 지났습니다 — 현재가를 갱신하세요' : '',\n        onName: e => this.updateHolding(h.id, { name: e.target.value }),\n        onCls: e => this.updateHolding(h.id, { cls: e.target.value }),\n        onQty: e => this.updateHolding(h.id, { qty: this.parseNum(e.target.value), qty_src: 'manual' }),\n        onPrice: e => this.updateHolding(h.id, { price: this.parseNum(e.target.value), price_src: 'manual', updatedAt: Date.now() }),\n        onValue: e => this.updateHolding(h.id, { value: this.parseNum(e.target.value), value_src: 'manual', updatedAt: Date.now() }),\n        onAvg: e => this.updateHolding(h.id, { avgCost: this.parseNum(e.target.value), avgCost_src: 'manual' }),\n        onKeyEnter: e => { if (e.key === 'Enter') e.target.blur(); },\n        onDelete: () => this.set({ holdings: S.holdings.filter(x => x.id !== h.id) })\n      };\n    };\n    // (증권사·계좌)별 그룹 — 첫 등장 순서 유지, 각 그룹 앞에 계좌 헤더행 삽입\n    const _groups = new Map();\n    S.holdings.forEach(h => {\n      const key = (h.broker || '미상') + '|' + (h.accountType || '일반');\n      if (!_groups.has(key)) _groups.set(key, { broker: h.broker || '미상', accountType: h.accountType || '일반', items: [], sub: 0 });\n      const g = _groups.get(key); g.items.push(h); g.sub += this.krw(h);\n    });\n    const rows = [];\n    _groups.forEach(g => {\n      rows.push({ isHeader: true, isHolding: false, broker: g.broker, atype: g.accountType,\n        atypeColor: (amap[g.accountType] || amap['일반']).color, subtotalStr: this.fmtW(g.sub) });\n      g.items.forEach(h => rows.push(mkRow(h)));\n    });\n    return rows;\n  }\n\n  // 자산배분 도넛의 호(arc)와 범례.\n  buildDonut(ctx) {\n    const { by, total } = ctx;\n    const donutSegs = [];\n    const legendRows = [];\n    let angle = -Math.PI / 2;\n    this.ALLOC.forEach(c => {\n      const v = by[c.key];\n      if (total > 0 && v > 0) {\n        const frac = v / total;\n        const a1 = angle + frac * Math.PI * 2;\n        const gap = 0.02;\n        donutSegs.push({ d: this.arcPath(100, 100, 82, angle + gap, Math.max(angle + gap, a1 - gap)), color: c.color });\n        legendRows.push({ label: c.label, color: c.color, pct: (frac * 100).toFixed(1) + '%' });\n        angle = a1;\n      }\n    });\n    return { donutSegs, legendRows };\n  }\n\n  // 현재 vs 목표 이탈 막대.\n  buildDrift(ctx) {\n    const { S, by, total, keys, cmap, band } = ctx;\n    const maxPct = Math.max(1, ...keys.map(k => total > 0 ? by[k] / total * 100 : 0), ...keys.map(k => S.target[k] || 0));\n    return keys.map(k => {\n      const cur = total > 0 ? by[k] / total * 100 : 0;\n      const tgt = S.target[k] || 0;\n      const diff = cur - tgt;\n      return {\n        key: k, label: cmap[k].label, color: cmap[k].color,\n        curW: (cur / maxPct * 100).toFixed(1) + '%',\n        tgtW: (tgt / maxPct * 100).toFixed(1) + '%',\n        curPct: cur.toFixed(1) + '%', tgtPct: tgt + '%',\n        diff: (diff >= 0 ? '+' : '') + diff.toFixed(1) + '%p',\n        diffColor: Math.abs(diff) >= band ? (diff > 0 ? '#ed4956' : '#1fa1ff') : '#999999'\n      };\n    });\n  }\n\n  // 목표 입력 행 · 합계 · 프리셋 버튼.\n  buildTarget(ctx) {\n    const { S, keys, cmap } = ctx;\n    const targetRows = keys.map(k => ({\n      key: k, label: cmap[k].label, color: cmap[k].color, val: S.target[k],\n      onChange: e => this.set({ target: { ...S.target, [k]: this.parseNum(e.target.value) || 0 } })\n    }));\n    const targetSum = keys.reduce((s, k) => s + (S.target[k] || 0), 0);\n    const presets = this.PRESETS.map(p => {\n      const active = keys.every(k => S.target[k] === p.t[k]);\n      return {\n        label: p.name + ' ' + keys.map(k => p.t[k]).join('·'),\n        bg: active ? '#1fa1ff' : 'transparent',\n        fg: active ? '#fff' : 'var(--text-primary,#000)',\n        bd: active ? '#1fa1ff' : 'var(--border-strong,#c4c4c4)',\n        onApply: () => this.set({ target: { ...p.t } })\n      };\n    });\n    return { targetRows, targetSum, presets };\n  }\n\n  // 이탈이 밴드를 넘는 자산군에 대한 리밸런싱 액션(큰 순).\n  buildActions(ctx) {\n    const { S, by, total, keys, cmap, amap, band } = ctx;\n    const acts = keys.map(k => {\n      const cur = total > 0 ? by[k] / total * 100 : 0;\n      const diff = cur - (S.target[k] || 0);\n      return { k, cur, diff };\n    }).filter(a => Math.abs(a.diff) >= band).sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));\n\n    return acts.map((a, i) => {\n      const c = cmap[a.k];\n      const shrink = a.diff > 0;\n      const amount = Math.abs(a.diff) / 100 * total;\n      const cand = S.holdings\n        .filter(h => h.cls === a.k || (h.cls === 'mixed' && (a.k === 'bond' || a.k === 'dividend')))\n        .sort((x, y) => this.krw(y) - this.krw(x)).slice(0, 2).map(h => h.name);\n      const inPension = S.holdings.some(h => (h.cls === a.k || h.cls === 'mixed') && (amap[h.accountType] || {}).pension);\n      let hint = shrink\n        ? (inPension ? '연금계좌 보유분부터 줄이면 세금 없이 조정됩니다' : '일반계좌 매도 시 세금·환율 시점을 확인하세요')\n        : '신규 매수 또는 월 적립금 배정으로 채우세요';\n      return {\n        n: i + 1,\n        dirLabel: shrink ? '축소' : '확대',\n        dirBg: shrink ? '#ed4956' : '#1fa1ff',\n        title: c.label + ' 비중 ' + Math.abs(a.diff).toFixed(1) + '%p ' + (shrink ? '줄이기' : '늘리기') + ' (' + a.cur.toFixed(1) + '% → ' + (S.target[a.k] || 0) + '%)',\n        amt: this.fmtShort(amount),\n        sub: (cand.length ? '대상 후보: ' + cand.join(' · ') + ' — ' : '') + hint\n      };\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
  <!-- ── 시세/추출 사이드카 (번들과 독립. localStorage 계약 pf_rebalancer_v1 만 사용) ──
       ① 앱의 Anthropic 호출을 로컬 서버(/complete)로 리다이렉트(키 불필요, 다중사진 그대로).
       ② 보유자산을 현재가로 재평가(/reprice) — 수량 없는 종목은 캡처 시점 종가로 역산(추정 표시).
       번들이 self-unpacking으로 문서를 재구성하며 DOM을 지우므로 setInterval로 재주입한다. -->
  <script>
  (function(){
    var URLK='pf_agent_url';
    function norm(u){return (u||'').trim().replace(/\/+$/,'');}
    function agent(){return norm(localStorage.getItem(URLK)||'');}
    // 에이전트 URL이 있으면 앱의 API키 가드(fetch 이전 window.prompt)를 통과시키기 위해 더미 키를 심는다.
    // 실제 요청은 아래 fetch 인터셉트가 터널 /complete 로 보내므로 키 값은 무시된다. URL을 지우면 더미 키 회수.
    var KEYK='pf_anthropic_key', DUMMY='via-agent-tunnel';
    function syncKey(){try{var k=localStorage.getItem(KEYK)||'';if(agent()){if(!k)localStorage.setItem(KEYK,DUMMY);}else if(k===DUMMY){localStorage.removeItem(KEYK);}}catch(e){}}
    syncKey();
    // ① fetch 인터셉트: 앱의 api.anthropic.com 추출/분류 호출을 서버 /complete 로 (에이전트 URL 설정 시)
    var _fetch=window.fetch.bind(window);
    // 추출은 CPU 모델이라 수 분 걸림 → 단일 요청이면 퀵터널(약 100초)에서 끊겨 "Failed to fetch".
    // 제출(즉시 id) 후 짧은 폴링으로 결과 수신. 폴링 실패는 재시도 → 터널 순간 끊김도 회복.
    function completeViaAgent(base, body){
      return _fetch(base+'/complete/submit',{method:'POST',headers:{'content-type':'application/json'},body:body})
        .then(function(r){return r.json();})
        .then(function(j){
          if(!j||!j.id) throw new Error((j&&j.error)||'제출 실패');
          var id=j.id, tries=0, fails=0;
          return new Promise(function(resolve,reject){
            function done(arr){resolve(new Response(JSON.stringify({content:arr}),{status:200,headers:{'content-type':'application/json'}}));}
            function poll(){
              _fetch(base+'/complete/result?id='+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(res){
                fails=0;
                if(res.status==='done') return done(res.content);
                if(res.status==='error') return reject(new Error(res.error||'추출 오류'));
                if(res.status==='unknown') return reject(new Error('작업을 찾을 수 없음 — 서버가 재시작된 것 같아요. 다시 시도하세요'));
                if(++tries>900) return reject(new Error('추출 시간 초과'));   // 900*2s = 30분 상한
                setTimeout(poll,2000);
              }).catch(function(e){
                if(++fails>20) return reject(new Error('연결 불안정 — '+(e&&e.message||e)));
                setTimeout(poll,2000);   // 터널 순간 끊김: 재시도(서버 잡은 계속 진행 중)
              });
            }
            poll();
          });
        });
    }
    window.fetch=function(input,init){
      try{
        var u=typeof input==='string'?input:(input&&input.url)||'';
        if(u.indexOf('api.anthropic.com')>=0){
          var b=agent();
          if(b) return completeViaAgent(b,(init&&init.body)||'{}');
        }
      }catch(e){}
      return _fetch(input,init);
    };
    // 배포 번들의 파일 input은 multiple=false로 컴파일됨 → 사진 1장만 선택 가능. 강제로 켠다.
    // (앱 extractFiles는 이미 여러 파일을 루프 처리하므로 input만 열어주면 다중 첨부됨)
    function patchFileInputs(){try{var a=document.querySelectorAll('input[type=file]');for(var i=0;i<a.length;i++){if(!a[i].multiple)a[i].multiple=true;}}catch(e){}}
    document.addEventListener('click',patchFileInputs,true);   // picker 열기 직전(capture)에도 보장
    // 사이드카는 이제 인프라만 담당: fetch 인터셉트 · 파일input 다중 · URL↔더미키 동기화.
    // (에이전트 URL·연결점은 앱 헤더로, 현재가 재평가는 STEP2로 이동 — dc-runtime 안에서 관리)
    syncKey(); patchFileInputs();
    setInterval(function(){syncKey();patchFileInputs();},1500);
  })();
  </script>
</body>
</html>
